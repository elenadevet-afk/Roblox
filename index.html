<iframe 
  srcdoc='
  <!DOCTYPE html>
  <html>
  <head>
    <meta charset="UTF-8">
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: "Segoe UI", sans-serif; height: 100vh; width: 100vw; }
      canvas { display: block; background: transparent; }
      
      #ui { position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; z-index: 10; pointer-events: none; }
      .badge { background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(188, 19, 254, 0.4); padding: 8px 15px; border-radius: 12px; font-weight: bold; font-size: 14px; backdrop-filter: blur(5px); }
      
      #ufo-timer {
        position: absolute; top: 10px; right: 20px; width: 90px; height: 50px;
        background: radial-gradient(ellipse at center, rgba(188, 19, 254, 0.8) 0%, rgba(0,0,0,0.4) 85%);
        border-radius: 50% 50% 40% 40%; border: 1px solid rgba(255,255,255,0.5);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: bold; box-shadow: 0 0 15px #bc13fe;
        animation: float 3s infinite ease-in-out; z-index: 100; font-size: 14px;
      }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

      #quiz { 
        position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); 
        background: rgba(255, 255, 255, 0.1); 
        border: 1px solid rgba(188, 19, 254, 0.5); 
        border-radius: 24px; 
        padding: 30px; width: 340px; color: white; text-align: center; z-index: 20; 
        backdrop-filter: blur(12px); 
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        display: block;
      }
      
      .btn { 
        background: rgba(255, 255, 255, 0.1); 
        border: 1px solid rgba(188, 19, 254, 0.6); 
        color: white; width: 100%; padding: 12px; margin: 8px 0; border-radius: 14px; 
        cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s;
        backdrop-filter: blur(5px);
      }
      .btn:hover { background: rgba(188, 19, 254, 0.8); border-color: #fff; }
    </style>
  </head>
  <body>
    <div id="ui">
      <div class="badge" id="hp">❤️ ❤️ ❤️</div>
      <div class="badge" id="st">STEP: 1/14</div>
    </div>
    
    <div id="ufo-timer"><span id="tm-val">0s</span></div>

    <div id="quiz">
        <div id="q-text" style="font-size:20px; font-weight:bold; margin-bottom:20px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5);"></div>
        <div id="ans-box"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      function playJumpSound() {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = "triangle";
          osc.frequency.setValueAtTime(150, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
      }

      const heroImg = new Image();
      heroImg.src = "https://i.postimg.cc/T35r8zHP/Dizajn-bez-nazvania-(2)-(2).png"; 

      // --- НОВЫЕ ИНТЕРЕСНЫЕ ЗАДАНИЯ ---
      const tasks = [
        { q: "I have wings but I am not a bird. I am a...", a: ["Bat", "Dog", "Fish"], c: 0 },
        { q: "Which word is the odd one out?", a: ["Apple", "Banana", "Carrot"], c: 2 },
        { q: "Look! The monkey ___ climbing the tree.", a: ["am", "is", "are"], c: 1 },
        { q: "What is the opposite of \"Fast\"?", a: ["Quick", "Slow", "High"], c: 1 },
        { q: "You go here to see old things and history:", a: ["Cinema", "Museum", "Park"], c: 1 },
        { q: "Which animal is the tallest?", a: ["Elephant", "Giraffe", "Hippo"], c: 1 },
        { q: "We have ten ___ on our feet.", a: ["fingers", "toes", "ears"], c: 1 },
        { q: "What color do you get if you mix Red and White?", a: ["Pink", "Orange", "Purple"], c: 0 },
        { q: "A person who flies a plane is a...", a: ["Doctor", "Chef", "Pilot"], c: 2 },
        { q: "It is very big, blue and salty. It is the...", a: ["River", "Ocean", "Lake"], c: 1 },
        { q: "Find the plural: One child, two ___.", a: ["childs", "children", "childrens"], c: 1 },
        { q: "What do you use to draw a straight line?", a: ["Eraser", "Ruler", "Pencil case"], c: 1 },
        { q: "Which month is the first month of the year?", a: ["December", "January", "February"], c: 1 },
        { q: "I ___ my teeth every morning.", a: ["wash", "brush", "clean"], c: 1 }
      ];

      let cur = 0, lives = 3, mistakes = 0;
      let jumpT = 1, startPos = {x: 0, y: 0}, targetPos = {x: 0, y: 0};
      let seconds = 0, timerActive = true;
      let isWin = false, victoryJumps = 0, victoryT = 0;

      setInterval(() => { if(timerActive) { seconds++; document.getElementById("tm-val").innerText = seconds + "s"; } }, 1000);

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.onresize = resize;
      resize();

      const plats = [];
      const pWidth = 85; 
      const pHeight = 45;

      for(let i=0; i < 15; i++) {
        plats.push({ 
          x: (canvas.width * 0.05) + (i * 75), 
          y: (canvas.height * 0.75) - (i * 20) 
        });
      }

      let heroPos = { x: plats[0].x, y: plats[0].y };

      function drawPlatform(x, y, active) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = active ? "#bc13fe" : "rgba(188, 19, 254, 0.2)";
        ctx.strokeStyle = active ? "#fff" : "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(pWidth/2, -pHeight/2); ctx.lineTo(pWidth, 0); ctx.lineTo(pWidth/2, pHeight/2); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      }

      function drawHero(x, y, t) {
        let bounce = 0;
        
        if (isWin && victoryJumps < 3) {
            victoryT += 0.05;
            bounce = Math.abs(Math.sin(victoryT * Math.PI)) * 100;
            if (victoryT >= 1) {
                victoryT = 0;
                victoryJumps++;
                playJumpSound();
            }
        } else {
            bounce = Math.sin(t * Math.PI) * 150;
        }

        const hSize = 350; 
        const px = x + pWidth/2 - hSize/2; 
        const py = y - hSize - bounce + 80; 

        if (heroImg.complete) {
            ctx.drawImage(heroImg, px, py, hSize, hSize);
        } else {
            ctx.fillStyle = "#00f7ff";
            ctx.fillRect(px + (hSize*0.4), py + (hSize*0.4), hSize*0.2, hSize*0.2);
        }
      }

      function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        plats.forEach((p, i) => drawPlatform(p.x, p.y, i <= cur));
        
        if (jumpT < 1) {
          jumpT += 0.04;
          heroPos.x = startPos.x + (targetPos.x - startPos.x) * jumpT;
          heroPos.y = startPos.y + (targetPos.y - startPos.y) * jumpT;
          
          if (jumpT >= 1) {
            jumpT = 1;
            if (cur === 14) {
                isWin = true;
                timerActive = false;
                setTimeout(showFinal, 2500); 
            } else {
                document.getElementById("quiz").style.display = "block"; 
                updateQuiz();
            }
          }
        }
        drawHero(heroPos.x, heroPos.y, jumpT);
        requestAnimationFrame(update);
      }

      function updateQuiz() {
        document.getElementById("st").innerText = `STEP: ${cur + 1}/14`;
        document.getElementById("q-text").innerText = tasks[cur].q;
        const box = document.getElementById("ans-box");
        box.innerHTML = "";
        tasks[cur].a.forEach((t, i) => {
          const b = document.createElement("button");
          b.className = "btn"; b.innerText = t;
          b.onclick = () => {
            if(i === tasks[cur].c) {
              playJumpSound();
              startPos = { x: heroPos.x, y: heroPos.y };
              cur++;
              targetPos = { x: plats[cur].x, y: plats[cur].y };
              jumpT = 0;
              document.getElementById("quiz").style.display = "none";
            } else {
              lives--; mistakes++;
              document.getElementById("hp").innerText = "❤️ ".repeat(lives) + "🖤 ".repeat(3-lives);
              if(lives <= 0) { timerActive = false; showFinal(); }
            }
          };
          box.appendChild(b);
        });
      }

      function showFinal() {
        const q = document.getElementById("quiz");
        q.style.display = "block";
        const won = lives > 0;
        q.innerHTML = `<h2 style="color:#bc13fe; text-shadow: 0 0 10px rgba(188,19,254,0.5)">${won ? "YOU WIN!" : "GAME OVER"}</h2>
          <p>Time: ${seconds}s | Mistakes: ${mistakes}</p>
          <button class="btn" onclick="location.reload()">PLAY AGAIN</button>`;
      }

      updateQuiz();
      update();
    </script>
  </body>
  </html>'
  style="width: 100%; height: 600px; border: none; background: transparent;"
></iframe>
